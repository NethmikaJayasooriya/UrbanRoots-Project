<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="splashscreen">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>splashscreen</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>


  <script>
    window.fbSDKReady = false;

    window.fbAsyncInit = function () {
      FB.init({
        appId  : '754421484415997', 
        cookie : true,
        xfbml  : true,
        version: 'v19.0'
      });
      FB.AppEvents.logPageView();
      window.fbSDKReady = true;
      console.log('✅ Facebook SDK ready — window.FB is now defined');
      window.dispatchEvent(new Event('fbSDKReady'));
    };
  </script>

  <script src="https://connect.facebook.net/en_US/sdk.js"></script>
  <script src="flutter_bootstrap.js" async></script>

</body>
</html>
