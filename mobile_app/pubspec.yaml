name: mobile_app 
description: "UrbanRoots Smart Garden Application"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2    
  geolocator: ^14.0.2
  
  # UI & Styling
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  font_awesome_flutter: ^10.6.0
  lucide_icons: 0.257.0
  
  # Networking & Core
  http: ^1.6.0
  payhere_mobilesdk_flutter: ^3.2.2
  js: ^0.6.7
  
  # Firebase, Authentication & Local Storage
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.2
  image_picker: ^1.2.1
  lottie: ^3.3.2
  shared_preferences: ^2.3.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.0.2
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/Plants/flowers/
    - assets/images/Plants/Fruits/
    - assets/images/Plants/Kitchen Essentials/
    - assets/animations/pet_idle.json
    - assets/animations/pet_happy.json
    - assets/animations/pet_sad.json

  fonts:
    - family: FiraSans
      fonts:
        - asset: fonts/FiraSans-Regular.ttf