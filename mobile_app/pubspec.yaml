name: mobile_app # Changed to match your internal imports!
description: "UrbanRoots Smart Garden Application"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  
  # UI & Styling
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  font_awesome_flutter: ^10.6.0
  lucide_icons: 0.257.0
  
  # Networking & Core
  http: ^1.6.0
  js: ^0.6.7
  
  # Local Storage (Added for Unique Garden Sessions)
  shared_preferences: ^2.2.3
  
  # Firebase & Authentication
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.2
  image_picker: ^1.2.1
  lottie: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/Plants/flowers/
    - assets/images/Plants/Fruits/
    - assets/images/Plants/Kitchen Essentials/
    - assets/animations/pet_idle.json
    - assets/animations/pet_happy.json
    - assets/animations/pet_sad.json
   
  fonts:
    - family: FiraSans
      fonts:
        - asset: fonts/FiraSans-Regular.ttf