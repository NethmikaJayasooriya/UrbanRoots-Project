name: splashscreen
description: "Creating the splash screen of the application"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.6.0
  google_fonts: ^8.0.1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_auth_web: ^6.1.2
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^6.1.0
  js: ^0.6.7
  _flutterfire_internals: ^1.3.66
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/user.png

  fonts:
    - family: FiraSans
      fonts:
        - asset: fonts/FiraSans-Regular.ttf